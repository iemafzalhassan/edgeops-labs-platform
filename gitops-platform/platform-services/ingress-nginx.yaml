# ============================================================
# GitOps Platform - Platform Services
# ============================================================
# Manages platform-level services deployed via ArgoCD
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  labels:
    platform.edgeops.io/type: platform-service
    platform.edgeops.io/service: ingress
spec:
  project: default

  source:
    chart: ingress-nginx
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.12.*
    helm:
      values: |
        controller:
          hostPort:
            enabled: true
          service:
            type: NodePort
          nodeSelector:
            ingress-ready: "true"
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Equal"
              effect: "NoSchedule"
          publishService:
            enabled: false
          extraArgs:
            publish-status-address: "localhost"

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
